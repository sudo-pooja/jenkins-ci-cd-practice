<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CICD Project Frontend</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="container">
      <header>
        <h1 class="title">CICD Project</h1>
        <p class="subtitle">Simple frontend served by the backend — clean UI with Poppins.</p>
      </header>

      <section class="card">
        <p id="msg" class="message">Click the button to get a greeting from the backend.</p>
        <div class="controls">
          <button id="greetBtn" class="btn">Get Greeting</button>
        </div>
      </section>

      <footer class="footer">Made with care · Simple, clean UI</footer>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
