<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CICD Project Frontend</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="container">
      <header>
        <div class="header-row">
          <div>
            <h1 class="title">CICD Project</h1>
            <p class="subtitle">Simple frontend served by the backend</p>
          </div>
        </div>
      </header>

      <section class="card notes">
        <form id="noteForm" class="note-form">
          <input id="title" placeholder="Title" required />
          <textarea id="body" placeholder="Write a note..." rows="3"></textarea>
          <div class="controls">
            <button id="addBtn" class="btn">Add Note</button>
          </div>
        </form>

        <ul id="notesList" class="notes-list" aria-live="polite">
          <li class="muted">No notes yet.</li>
        </ul>
      </section>

      <footer class="footer">Made with care · Simple, clean UI</footer>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
